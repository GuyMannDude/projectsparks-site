  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #08080f;
    --gold: #d4a82a;
    --gold-bright: #f0c848;
    --gold-glow: rgba(212, 168, 42, 0.6);
    --gold-dim: rgba(212, 168, 42, 0.2);
    --text: #e8e8f0;
    --text-bright: #ffffff;
    --text-sub: #9090a0;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  .page {
    min-height: 100vh;
    display: flex;

    align-items: center;

    text-transform: uppercase;
    margin-bottom: 40px;

  .content {
    max-width: 600px;
    line-height: 1.8;
  }

  .content p {
    font-size: 20px;
    font-weight: 300;
    color: var(--text);
    margin-bottom: 24px;
  }

  .content .team {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--gold);
    margin-top: 30px;
  }

  .content a {
    color: var(--gold);
    text-decoration: none;
    border-bottom: 1px solid var(--gold-dim);
    transition: border-color 0.3s;
  }

  .content a:hover {
    border-color: var(--gold-bright);
  }

  .back {
    margin-top: 50px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .back a {
    color: var(--text-sub);
    text-decoration: none;
    transition: color 0.3s;
  }

  .back a:hover { color: var(--text-bright); }
